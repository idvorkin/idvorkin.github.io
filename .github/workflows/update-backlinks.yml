name: Update Backlinks

on:
  push:
    branches: [main]
    paths: ['_d/**', '_td/**', '_ig66/**']
  workflow_dispatch:

concurrency:
  group: update-backlinks
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-backlinks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - run: bundle exec jekyll build --config _config.yml,_config_ci.yml

      - uses: astral-sh/setup-uv@v4

      - name: Update backlinks and push
        run: |
          set -euo pipefail

          # Find changed content files (github.event.before is empty on workflow_dispatch)
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$BEFORE"..HEAD | grep -E '^(_d|_td|_ig66)/.*\.md$' || true)

          if [ -z "$CHANGED" ]; then
            echo "No content markdown changes"
            exit 0
          fi
          echo "Changed: $CHANGED"

          echo "$CHANGED" | xargs uv run ./build_back_links.py delta

          if git diff --quiet back-links.json; then
            echo "back-links.json unchanged"
            exit 0
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add back-links.json
          git commit -m "chore: update backlinks [skip ci]"
          git push

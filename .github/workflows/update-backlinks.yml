name: Update Backlinks

on:
  push:
    branches: [main]
    paths: ['_d/**', '_td/**', '_ig66/**']
  workflow_dispatch:

concurrency:
  group: update-backlinks
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-backlinks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - run: bundle exec jekyll build --config _config.yml,_config_ci.yml

      - uses: astral-sh/setup-uv@v7

      - name: Update backlinks
        run: |
          set -euo pipefail

          # Find changed content files (github.event.before is empty on workflow_dispatch)
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$BEFORE"..HEAD | grep -E '^(_d|_td|_ig66)/.*\.md$' || true)

          if [ -z "$CHANGED" ]; then
            echo "No content markdown changes"
            exit 0
          fi
          echo "Changed: $CHANGED"

          echo "$CHANGED" | xargs uv run ./build_back_links.py delta

      - name: Create pull request for backlinks update
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update backlinks [skip ci]"
          title: "chore: update backlinks"
          body: "Automated backlinks update triggered by content changes."
          branch: chore/update-backlinks
          delete-branch: true
          labels: "automated"

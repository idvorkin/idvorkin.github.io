name: Weekly Changelog

on:
  schedule:
    - cron: '0 14 * * 1' # Every Monday at 2pm UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back'
        required: false
        default: '7'
        type: string

concurrency:
  group: weekly-changelog
  # Never cancel an in-flight generation: it may be mid-write to _d/changelog.md,
  # and a cancel would leave partial content that the verify step would either
  # fail on (good) or, if the file was already rewritten before the cancel,
  # silently ship (bad). Let the first run finish; queue late dispatches.
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Required by anthropics/claude-code-action@v1: its setupGitHubToken flow
  # calls getOidcToken, which fails with "Unable to get ACTIONS_ID_TOKEN_REQUEST_URL
  # env variable" unless id-token: write is granted. Sibling workflows
  # (claude.yml, claude-code-review.yml) already have this.
  id-token: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for git log

      - name: Compute week-of date
        id: date
        run: echo "week_of=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Snapshot changelog before generation
        id: pre
        run: |
          if [ -f _d/changelog.md ]; then
            sha256sum _d/changelog.md | awk '{print "hash="$1}' >> "$GITHUB_OUTPUT"
          else
            echo "hash=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Changelog
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Scheduled runs have `github-actions[bot]` as the triggering actor;
          # without this, the action's default bot-exclusion would block the
          # scheduled trigger. Manual dispatch (human actor) is unaffected.
          allowed_bots: 'github-actions[bot]'
          # By default, claude-code-action@v1 does NOT permit Bash — see
          # docs/capabilities-and-limitations.md: "By default, Claude cannot
          # execute Bash commands unless explicitly allowed." The /changelog
          # skill relies on `git log`, `git diff`, `git show`, `gh repo list`,
          # and `gh api` — without this allowlist, every Bash call would be
          # refused and the cross-repo scan would silently produce nothing,
          # leaving the verify step to fail the job with a confusing error.
          # Edit/Read/Write/Grep/Glob are needed for reading the existing
          # changelog, editing the TOC, and writing the new entry.
          claude_args: |
            --allowedTools "Bash,Edit,Read,Write,Grep,Glob"
          prompt: |
            /changelog
            Look back ${{ inputs.days || '7' }} days. The week-of date is ${{ steps.date.outputs.week_of }} (UTC).

            ## Environment: GitHub Actions (headless)

            You are running inside the `.github/workflows/changelog.yml` workflow
            on an ubuntu-latest runner — NOT on Igor's local machine. This means:

            - **No `upstream` remote exists in this checkout.** The SKILL.md examples
              use `upstream/main` because that's Igor's local convention, but here
              there is only `origin`. Substitute `origin/main` (or just `HEAD`) for
              every `upstream/main` reference in the skill's git commands.
            - No Jekyll server is running; do NOT try to start one or open browser previews
            - No `nvim` is installed; update the TOC by editing the markdown directly
              between the `<!-- vim-markdown-toc-start -->` / `<!-- vim-markdown-toc-end -->`
              markers, matching the indentation of existing entries
            - `gh` CLI is authenticated via GITHUB_TOKEN — it can read public repos in
              both `idvorkin` and `idvorkin-ai-tools`. To avoid rate limits during
              cross-repo scans, prefer one `gh repo list` per org, then batch the
              per-repo commit queries; stop early if you hit a 403/429.
            - Do NOT commit or push; the next workflow step (peter-evans/create-pull-request)
              will handle staging, committing, and opening the PR. Just write the file.

            ## On errors

            If anything fails — a `gh` call, a git operation, a file read, a skill step —
            print the full error to stdout (it lands in the GitHub Actions job log) and
            keep going where sensible. Do not silently swallow failures. At the end,
            summarize what succeeded and what didn't so the job log is self-explanatory.

            ## When you're done

            Exit immediately after writing `_d/changelog.md`. Do not hang around, do not
            wait for approval, do not try additional verification steps. The workflow
            has a 10-minute budget for the whole job — aim to finish generation in under 8.

      - name: Verify changelog was updated
        run: |
          if [ ! -f _d/changelog.md ]; then
            echo "::error::_d/changelog.md missing after generation step"
            exit 1
          fi
          new_hash=$(sha256sum _d/changelog.md | awk '{print $1}')
          old_hash='${{ steps.pre.outputs.hash }}'
          if [ "$new_hash" = "$old_hash" ]; then
            echo "::error::_d/changelog.md unchanged — Claude produced no output. Aborting before PR creation."
            exit 1
          fi
          if ! git diff --quiet -- _d/changelog.md; then
            echo "Changelog diff detected, proceeding to PR creation."
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: changelog/week-of-${{ steps.date.outputs.week_of }}
          base: main
          add-paths: _d/changelog.md
          title: 'content: changelog entry for week of ${{ steps.date.outputs.week_of }}'
          commit-message: 'content: changelog entry for week of ${{ steps.date.outputs.week_of }}'
          body: |
            Automated weekly changelog generated by `.github/workflows/changelog.yml`.

            Generated by Claude via the `/changelog` skill, which scans both
            `idvorkin` and `idvorkin-ai-tools` public repos and writes themed
            entries based on actual content diffs.

            **Note**: PRs opened by `github-actions[bot]` don't trigger the
            `claude-code-review` workflow. Review manually or comment `@claude`
            to invoke it.

            🤖 Generated with [Claude Code](https://claude.com/claude-code)
          labels: |
            changelog
            automated
          delete-branch: true
